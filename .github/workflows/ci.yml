name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.12"

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install project
        run: |
          python -m pip install -e ".[dev]"

      - name: Ruff Lint
        run: |
          ruff check .

      - name: Ruff Format
        run: |
          ruff format --check .

      - name: MyPy
        run: |
          mypy

      - name: PyTest
        run: |
          pytest

      - name: Build Package
        run: |
          python -m build
